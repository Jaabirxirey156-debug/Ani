<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
background:#2f3e46;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}
.login-box{
background:white;
padding:30px;
width:300px;
border-radius:8px;
}
input{
width:100%;
padding:10px;
margin:10px 0;
}
button{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
}
</style>
</head>
<body>

<div class="login-box">
<h2>Login</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button>Login</button>
</div>

</body>
</html>
