<!DOCTYPE html>
<html>
<head>
<title>Settings</title>
<style>
body{
font-family:Arial;
background:#f4f4f4;
}
.card{
width:70%;
margin:30px auto;
background:white;
padding:20px;
border-radius:8px;
}
h1{
background:#2f3e46;
color:white;
text-align:center;
padding:15px;
}
input,select{
width:100%;
padding:10px;
margin:10px 0;
}
button{
background:green;
color:white;
border:none;
padding:10px 15px;
}
</style>
</head>
<body>

<div class="card">
<h1>Settings</h1>

<h3>Profile Settings</h3>

<label>Username</label>
<input type="text" placeholder="Your username">

<label>Email</label>
<input type="email" placeholder="Your email address">

<label>Theme</label>

<select>
<option>Dark</option>
<option>Light</option>
</select>

<button>Save Settings</button>
</div>

</body>
</html>
